openapi: 3.1.0
info:
  title: KPubData Builder Service API
  version: "1.0.0"
  description: >-
    Builder 중심 서비스 계약. BuildSpec 검증, preview, build 실행, artifact 조회,
    계약 버전 조회를 제공한다. CLI와 HTTP service mode(#36)가 동일한 도메인 계약을
    공유한다. 본 문서는 BuilderService(service/app.py)의 dispatch 라우팅과 실제
    wire 형태를 기계 판독용(OpenAPI 3.1) 단일 소스로 고정하며, Studio 같은 소비자가
    타입 클라이언트를 생성하는 기준이 된다. 구현되지 않은 비동기/publish 엔드포인트는
    드리프트를 막기 위해 계약에서 제거했다(#226).
servers:
  - url: http://localhost:8000
    description: 로컬 builder 개발 서버

paths:
  /version:
    get:
      operationId: getVersion
      summary: Builder API 계약 버전 조회
      responses:
        "200":
          description: 서비스/계약 버전
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"

  /validate:
    post:
      operationId: validateSpec
      summary: BuildSpec 검증 (동기식)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecRequest"
      responses:
        "200":
          description: 검증 통과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateResponse"
        "400":
          description: spec 파싱 실패 또는 검증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /preview:
    post:
      operationId: previewBuild
      summary: 각 소스의 스키마와 샘플 행 산출 (파일 미기록, 동기식)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewRequest"
      responses:
        "200":
          description: preview 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewResponse"
        "400":
          description: 잘못된 요청(spec 누락/검증 실패, limit 타입 오류 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /build:
    post:
      operationId: createBuild
      summary: 파이프라인 실행 및 결과 반환 (동기식)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRequest"
      responses:
        "200":
          description: 모든 소스 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildSuccessResponse"
        "400":
          description: 잘못된 요청(spec 누락/검증 실패, run_id 타입/경로 안전성 오류 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: >-
            하나 이상의 소스 fetch/stage 실패. upstream 소스 의존 실패이며 매니페스트는
            partial 정책으로 남는다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildFailureResponse"

  /artifacts/{run_id}:
    get:
      operationId: listBuildArtifacts
      summary: 실행 워크스페이스의 산출물 파일 목록 조회
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: artifact 파일 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactsResponse"
        "400":
          description: 경로 안전하지 않은 run_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 해당 run을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    RunId:
      name: run_id
      in: path
      required: true
      description: build 실행 식별자(경로 안전한 단일 세그먼트)
      schema:
        type: string

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: 사람이 읽는 오류 요약 메시지

    ValidationError:
      type: object
      description: >-
        validate/build/preview의 spec 검증 실패 응답. SpecLoadError는
        {status:"error", error}, ValidationError는 {status:"invalid", problems}로
        나뉜다.
      required: [status]
      properties:
        status:
          type: string
          enum: [error, invalid]
        error:
          type: string
          description: status=error일 때의 파싱 오류 메시지
        problems:
          type: array
          description: status=invalid일 때의 검증 문제 목록
          items:
            type: string

    BuildSpec:
      type: object
      description: >-
        선언적 빌드 명세(snake_case). dataset_id/title/description/sources/exports는
        필수, metadata/transforms/publish/splits는 선택. 세부 스키마는 spec 모델
        (spec/models.py)을 따른다.
      additionalProperties: true
      required: [dataset_id, title, description, sources, exports]
      properties:
        dataset_id:
          type: string
        title:
          type: string
        description:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceRef"
        exports:
          type: array
          items:
            $ref: "#/components/schemas/ExportTarget"
        metadata:
          type: object
          additionalProperties:
            type: string

    SourceRef:
      type: object
      required: [provider, dataset]
      properties:
        provider:
          type: string
        dataset:
          type: string
        params:
          type: object
          additionalProperties: true
        alias:
          type: string
        normalization_mode:
          type: string

    ExportTarget:
      type: object
      required: [kind, output_path]
      properties:
        kind:
          type: string
        output_path:
          type: string
        options:
          type: object
          additionalProperties: true

    SpecRequest:
      type: object
      required: [spec]
      properties:
        spec:
          type: string
          description: BuildSpec을 YAML로 직렬화한 문자열

    PreviewRequest:
      type: object
      required: [spec]
      properties:
        spec:
          type: string
          description: BuildSpec을 YAML로 직렬화한 문자열
        limit:
          type: integer
          minimum: 1
          default: 5

    BuildRequest:
      type: object
      required: [spec]
      properties:
        spec:
          type: string
          description: BuildSpec을 YAML로 직렬화한 문자열
        run_id:
          type: string
          description: 명시 시 비어있지 않은 경로 안전한 단일 세그먼트여야 한다

    VersionResponse:
      type: object
      required: [service, api_version]
      properties:
        service:
          type: string
        api_version:
          type: string

    ValidateResponse:
      type: object
      required: [status, dataset_id, api_version]
      properties:
        status:
          type: string
          enum: [valid]
        dataset_id:
          type: string
        api_version:
          type: string

    PreviewResponse:
      type: object
      required: [dataset_id, previews]
      properties:
        dataset_id:
          type: string
        previews:
          type: array
          items:
            $ref: "#/components/schemas/SourcePreview"

    SourcePreview:
      type: object
      required: [source_key, status, schema, sample, total_rows]
      properties:
        source_key:
          type: string
        status:
          type: string
        error:
          type: [string, "null"]
        schema:
          type: array
          items:
            type: object
            required: [name, dtype, nullable, unique_count]
            properties:
              name:
                type: string
              dtype:
                type: string
              nullable:
                type: boolean
              unique_count:
                type: integer
        sample:
          type: array
          items:
            type: object
            additionalProperties: true
        total_rows:
          type: integer

    BuildOutcome:
      type: object
      required: [source_key, status, stages_completed, error]
      properties:
        source_key:
          type: string
        status:
          type: string
          enum: [ok, failed]
        stages_completed:
          type: array
          items:
            type: string
        error:
          type: [string, "null"]

    BuildSuccessResponse:
      type: object
      required: [status, run_id, outcomes, manifest, api_version]
      properties:
        status:
          type: string
          enum: [ok]
        run_id:
          type: string
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/BuildOutcome"
        manifest:
          type: string
          description: 기록된 manifest.json의 경로
        api_version:
          type: string

    BuildFailureResponse:
      type: object
      required: [status, run_id, outcomes, manifest, api_version, error]
      properties:
        status:
          type: string
          enum: [failed]
        run_id:
          type: string
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/BuildOutcome"
        manifest:
          type: string
          description: partial 정책으로 남은 manifest.json의 경로
        api_version:
          type: string
        error:
          type: string
          description: 첫 번째 실패 outcome의 error에서 파생된 human-readable 요약 (#226)

    ArtifactsResponse:
      type: object
      required: [run_id, files]
      properties:
        run_id:
          type: string
        files:
          type: array
          items:
            type: string
            description: run 디렉터리 기준 상대 파일 경로
