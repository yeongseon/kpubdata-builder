# Seoul Officetel Rent — HuggingFace Dataset Publishing Config Template
# Dataset: kpubdata/seoul-officetel-rent
# Source: data.go.kr MOLIT officetel rent real transaction data
# Scope: Seoul, all 25 districts
# NOTE: fetch_params are generated by generate_fetch_params.py

source:
  provider: datago
  dataset: offi_rent
  source_url: "https://www.data.go.kr/data/15058354/openapi.do"
  list_all: true
  fetch_params: []  # Will be populated by generator

transform:
  column_mapping:
    offiNm: officetel_name
    buildYear: build_year
    dealYear: deal_year
    dealMonth: deal_month
    dealDay: deal_day
    deposit: deposit
    monthlyRent: monthly_rent
    excluUseAr: exclusive_area
    floor: floor
    jibun: jibun
    umdNm: district
    sggCd: region_code
    contractType: contract_type
    contractTerm: contract_term
    preDeposit: previous_deposit
    preMonthlyRent: previous_monthly_rent
    roadnm: road_name

  dtypes:
    build_year: int
    deal_year: int
    deal_month: int
    deal_day: int
    deposit: int_comma
    monthly_rent: int_comma
    exclusive_area: float
    floor: int
    previous_deposit: int_comma
    previous_monthly_rent: int_comma

  derived:
    - name: deal_date
      expr: "concat_date(deal_year, deal_month, deal_day)"
      dtype: str

  filters:
    - "deal_year >= 2020"

output:
  staging_dir: "./staging/seoul-officetel-rent"
  parquet_filename: "data/train.parquet"
  hf_repo: "kpubdata/seoul-officetel-rent"

card:
  title: "Seoul Officetel Rent (Jeonse/Wolse) Real Transaction Data"
  description: |
    Real transaction data for officetel rent (jeonse and wolse) in Seoul, South Korea.
    Covers all 25 districts with monthly granularity.

    - **전세 (Jeonse)**: Large lump-sum deposit, no monthly rent (monthly_rent = 0)
    - **월세 (Wolse)**: Smaller deposit + monthly rent payments

    Data sourced from Korea's Ministry of Land, Infrastructure and Transport (국토교통부)
    via the official data.go.kr API.
  license: cc-by-4.0
  language:
    - ko
  tags:
    - real-estate
    - korea
    - seoul
    - officetel
    - rent
    - jeonse
    - wolse
    - public-data
  task_categories:
    - tabular-regression
    - tabular-classification
  features:
    - name: officetel_name
      description: Name of the officetel building (오피스텔명)
    - name: build_year
      description: Year the building was constructed (건축년도)
    - name: deal_year
      description: Transaction year (거래년도)
    - name: deal_month
      description: Transaction month (거래월)
    - name: deal_day
      description: Transaction day (거래일)
    - name: deal_date
      description: "Transaction date in YYYY-MM-DD format (derived)"
    - name: deposit
      description: "Deposit amount in 만원 (10,000 KRW units) — 보증금"
    - name: monthly_rent
      description: "Monthly rent in 만원 (10,000 KRW units) — 월세 (0 = jeonse)"
    - name: exclusive_area
      description: "Exclusive area in ㎡ (전용면적)"
    - name: floor
      description: Floor number (층)
    - name: jibun
      description: Land lot number (지번)
    - name: district
      description: District name within gu (법정동)
    - name: region_code
      description: Administrative district code (시군구코드)
    - name: contract_type
      description: "Contract type — 신규/갱신 (new/renewal)"
    - name: contract_term
      description: Contract term in months (계약기간)
    - name: previous_deposit
      description: "Previous deposit amount for renewal contracts (종전 보증금)"
    - name: previous_monthly_rent
      description: "Previous monthly rent for renewal contracts (종전 월세)"
    - name: road_name
      description: Road name address (도로명)
  attribution: |
    데이터 출처: 국토교통부 오피스텔 전월세 실거래가 자료
    (Ministry of Land, Infrastructure and Transport — Officetel Rent Transaction Data)
