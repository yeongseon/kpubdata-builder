# 한국관광공사 행사정보 — HuggingFace Dataset Publishing Config
# Dataset: kpubdata/tour-festival
# Source: data.go.kr TourAPI KorService2

source:
  provider: datago
  dataset: tour_kor_festival
  source_url: "https://www.data.go.kr/data/15101578/openapi.do"
  list_all: true
  fetch_params:
    - eventStartDate: "20260101"

transform:
  column_mapping:
    title: title
    addr1: address
    addr2: address_detail
    areacode: area_code
    sigungucode: sigungu_code
    contentid: content_id
    contenttypeid: content_type_id
    mapx: longitude
    mapy: latitude
    tel: phone
    firstimage: image_url
    eventstartdate: event_start_date
    eventenddate: event_end_date

  dtypes:
    longitude: float
    latitude: float

  derived: []
  filters: []

output:
  staging_dir: "./staging/tour-festival"
  parquet_filename: "data/train.parquet"
  hf_repo: "kpubdata/tour-festival"

card:
  title: "Korea Tourism Festival/Event Information (행사정보)"
  description: |
    Festival and event information from the Korea Tourism Organization
    (한국관광공사) via TourAPI. Includes event dates, locations,
    and descriptions.
  license: cc-by-4.0
  language:
    - ko
  tags:
    - tourism
    - korea
    - festival
    - events
    - public-data
  features:
    - name: title
      description: Event/festival name (행사명)
    - name: address
      description: Address (주소)
    - name: event_start_date
      description: Event start date (행사시작일)
    - name: event_end_date
      description: Event end date (행사종료일)
    - name: longitude
      description: Longitude (경도)
    - name: latitude
      description: Latitude (위도)
