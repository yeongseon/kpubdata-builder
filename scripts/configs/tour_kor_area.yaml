# 한국관광공사 지역기반 관광정보 — HuggingFace Dataset Publishing Config
# Dataset: kpubdata/tour-area-based
# Source: data.go.kr TourAPI KorService2

source:
  provider: datago
  dataset: tour_kor_area
  source_url: "https://www.data.go.kr/data/15101578/openapi.do"
  list_all: true
  fetch_params:
    - areaCode: "1"
      contentTypeId: "12"

transform:
  column_mapping:
    title: title
    addr1: address
    addr2: address_detail
    areacode: area_code
    sigungucode: sigungu_code
    contentid: content_id
    contenttypeid: content_type_id
    mapx: longitude
    mapy: latitude
    tel: phone
    firstimage: image_url
    cat1: category_large
    cat2: category_medium
    cat3: category_small

  dtypes:
    longitude: float
    latitude: float

  derived: []
  filters: []

output:
  staging_dir: "./staging/tour-area-based"
  parquet_filename: "data/train.parquet"
  hf_repo: "kpubdata/tour-area-based"

card:
  title: "Korea Tourism Area-Based Information (지역기반 관광정보)"
  description: |
    Area-based tourism information from the Korea Tourism Organization
    (한국관광공사) via TourAPI. Includes tourist attractions, restaurants,
    accommodations, and more.
  license: cc-by-4.0
  language:
    - ko
  tags:
    - tourism
    - korea
    - location
    - public-data
  features:
    - name: title
      description: Name of the attraction/place (관광지명)
    - name: address
      description: Address (주소)
    - name: longitude
      description: Longitude (경도)
    - name: latitude
      description: Latitude (위도)
    - name: content_type_id
      description: "Content type (12=관광지, 14=문화시설, 15=행사, etc.)"
