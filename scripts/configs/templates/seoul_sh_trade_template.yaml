# Seoul Single House Trade — HuggingFace Dataset Publishing Config Template
# Dataset: kpubdata/seoul-singlehouse-trades
# Source: data.go.kr MOLIT single/multi-family house (단독/다가구) trade data
# Scope: Seoul, all 25 districts
# NOTE: fetch_params are generated by generate_fetch_params.py

source:
  provider: datago
  dataset: sh_trade
  source_url: "https://www.data.go.kr/data/15058022/openapi.do"
  list_all: true
  fetch_params: []  # Will be populated by generator

transform:
  column_mapping:
    buildYear: build_year
    dealYear: deal_year
    dealMonth: deal_month
    dealDay: deal_day
    dealAmount: deal_amount
    totalFloorAr: total_floor_area
    plottageAr: land_area
    jibun: jibun
    umdNm: district
    sggCd: region_code
    houseType: house_type
    roadnm: road_name

  dtypes:
    build_year: int
    deal_year: int
    deal_month: int
    deal_day: int
    deal_amount: int_comma
    total_floor_area: float
    land_area: float

  derived:
    - name: deal_date
      expr: "concat_date(deal_year, deal_month, deal_day)"
      dtype: str

  filters:
    - "deal_year >= 2020"

output:
  staging_dir: "./staging/seoul-singlehouse-trades"
  parquet_filename: "data/train.parquet"
  hf_repo: "kpubdata/seoul-singlehouse-trades"

card:
  title: "Seoul Single/Multi-Family House Trade Real Transaction Data"
  description: |
    Real transaction data for single-family and multi-family house (단독/다가구)
    sales in Seoul, South Korea. Covers all 25 districts with monthly granularity.

    Data sourced from Korea's Ministry of Land, Infrastructure and Transport (국토교통부)
    via the official data.go.kr API.
  license: cc-by-4.0
  language:
    - ko
  tags:
    - real-estate
    - korea
    - seoul
    - single-house
    - trade
    - public-data
  task_categories:
    - tabular-regression
  features:
    - name: build_year
      description: Year the building was constructed (건축년도)
    - name: deal_year
      description: Transaction year (거래년도)
    - name: deal_month
      description: Transaction month (거래월)
    - name: deal_day
      description: Transaction day (거래일)
    - name: deal_date
      description: "Transaction date in YYYY-MM-DD format (derived)"
    - name: deal_amount
      description: "Transaction amount in 만원 (10,000 KRW units) — 거래금액"
    - name: total_floor_area
      description: "Total floor area in ㎡ (연면적)"
    - name: land_area
      description: "Land area in ㎡ (대지면적)"
    - name: jibun
      description: Land lot number (지번)
    - name: district
      description: District name within gu (법정동)
    - name: region_code
      description: Administrative district code (시군구코드)
    - name: house_type
      description: "House type — 단독/다가구 (single/multi-family)"
    - name: road_name
      description: Road name address (도로명)
  attribution: |
    데이터 출처: 국토교통부 단독/다가구 매매 실거래가 자료
    (Ministry of Land, Infrastructure and Transport — Single House Trade Transaction Data)
