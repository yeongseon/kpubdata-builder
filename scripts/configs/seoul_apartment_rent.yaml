  column_mapping:
    aptNm: apartment_name
    buildYear: build_year
    dealYear: deal_year
    dealMonth: deal_month
    dealDay: deal_day
    deposit: deposit
    monthlyRent: monthly_rent
    excluUseAr: exclusive_area
    floor: floor
    jibun: jibun
    umdNm: district
    sggCd: region_code
    contractType: contract_type
    contractTerm: contract_term
    preDeposit: previous_deposit
    preMonthlyRent: previous_monthly_rent
    useRRRight: use_request_right
    roadnm: road_name
  dtypes:
    build_year: int
    deal_year: int
    deal_month: int
    deal_day: int
    deposit: int_comma
    monthly_rent: int_comma
    exclusive_area: float
    floor: int
    previous_deposit: int_comma
    previous_monthly_rent: int_comma
  derived:
  - name: deal_date
    expr: concat_date(deal_year, deal_month, deal_day)
    dtype: str
  filters:
  - deal_year >= 2020
output:
  staging_dir: ./staging/seoul-apartment-rent
  parquet_filename: data/train.parquet
  hf_repo: kpubdata/seoul-apartment-rent
card:
  title: Seoul Apartment Rent (Jeonse/Wolse) Real Transaction Data
  description: 'Real transaction data for apartment rent (jeonse and wolse) in Seoul,
    South Korea.

    Covers all 25 districts with monthly granularity.


    - **전세 (Jeonse)**: Large lump-sum deposit, no monthly rent (monthly_rent = 0)

    - **월세 (Wolse)**: Smaller deposit + monthly rent payments


    Data sourced from Korea''s Ministry of Land, Infrastructure and Transport (국토교통부)

    via the official data.go.kr API.

    '
  license: cc-by-4.0
  language:
  - ko
  tags:
  - real-estate
  - korea
  - seoul
  - apartment
  - rent
  - jeonse
  - wolse
  - public-data
  task_categories:
  - tabular-regression
  - tabular-classification
  features:
  - name: apartment_name
    description: Name of the apartment complex (아파트명)
  - name: build_year
    description: Year the building was constructed (건축년도)
  - name: deal_year
    description: Transaction year (거래년도)
  - name: deal_month
    description: Transaction month (거래월)
  - name: deal_day
    description: Transaction day (거래일)
  - name: deal_date
