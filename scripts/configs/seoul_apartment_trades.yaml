transform:
  # Map raw API field names to clean English column names.
  # Only mapped columns are kept in the final output.
  column_mapping:
    sggCd: district_code
    umdNm: neighborhood
    aptNm: apartment_name
    excluUseAr: exclusive_area_m2
    floor: floor
    buildYear: build_year
    dealYear: deal_year
    dealMonth: deal_month
    dealDay: deal_day
    dealAmount: deal_amount_10k_krw
    jibun: lot_number
    rgstDate: registration_date
    aptSeq: apartment_seq

  # Type casting applied after column mapping.
  # Supported types: int, float, str
  # Special: "int_comma" strips commas before converting (e.g. "82,500" -> 82500)
  dtypes:
    district_code: str
    neighborhood: str
    apartment_name: str
    exclusive_area_m2: float
    floor: int
    build_year: int
    deal_year: int
    deal_month: int
    deal_day: int
    deal_amount_10k_krw: int_comma
    lot_number: str
    registration_date: str
    apartment_seq: str

  # Optional derived columns computed after type casting.
  derived:
    - name: deal_date
      expr: "concat_date(deal_year, deal_month, deal_day)"
      dtype: str

  # Optional row filter expressions (Polars filter syntax).
  # Rows not matching ALL filters are dropped.
  filters:
    - "deal_amount_10k_krw > 0"

output:
  hf_repo: "kpubdata/seoul-apartment-trades"
  kaggle_slug: "yschoe/seoul-apartment-trades"
  parquet_filename: "data/train.parquet"
  # Local staging directory (relative to script working dir)
  staging_dir: "./staging/seoul-apartment-trades"

card:
  title: "Seoul Apartment Trades (서울 아파트 매매 실거래가)"
  description: |
    Real apartment sale transaction records in Seoul, South Korea,
    covering all 25 districts (gu) from January 2020 to December 2024 (60 months).

    Sourced from the Ministry of Land, Infrastructure and Transport (MOLIT)
    via data.go.kr public data API.

    **Important**: Text values (neighborhood, apartment_name) are in Korean.
    Column names are in English for global accessibility.
    Use `district_code` with the provided mapping table for district-level filtering.

    The target variable for regression tasks is `deal_amount_10k_krw`
    (transaction price in units of 10,000 KRW).
  license: "cc-by-4.0"
  language:
    - ko
    - en
  tags:
    - real-estate
    - housing-prices
    - korea
    - seoul
    - tabular
    - regression
    - time-series
    - apartment
    - property
  task_categories:
    - tabular-regression
  features:
    - name: district_code
      description: "5-digit administrative district code (시군구코드)"
    - name: neighborhood
      description: "Legal neighborhood name in Korean (법정동명, e.g. 역삼동)"
    - name: apartment_name
      description: "Apartment complex name in Korean (아파트 단지명)"
    - name: exclusive_area_m2
      description: "Exclusive use area in square meters (전용면적, m²)"
    - name: floor
      description: "Floor number of the traded unit (거래 층수)"
    - name: build_year
      description: "Year the building was constructed (건축년도)"
    - name: deal_year
      description: "Year of the transaction (거래년도)"
    - name: deal_month
      description: "Month of the transaction (거래월)"
    - name: deal_day
      description: "Day of the transaction (거래일)"
    - name: deal_amount_10k_krw
      description: "Transaction price in 10,000 KRW (거래금액, 만원 단위 — target variable)"
    - name: lot_number
      description: "Lot number / land parcel ID (지번)"
    - name: deal_date
      description: "Transaction date as YYYY-MM-DD string (거래일자, derived)"
    - name: registration_date
      description: "Registration date at registry office (등기일자). May be null for older records."
    - name: apartment_seq
      description: "Unique apartment complex identifier (아파트 일련번호)"

